plugins:
  - rubocop-performance

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  Exclude:
    - "*.gemspec"
    - "bin/**/*"
    - "fixtures/**/*"

Metrics/AbcSize:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Naming/PredicateMethod:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/NumericPredicate:
  Enabled: false

Style/HashConversion:
  Enabled: false

Style/MutableConstant:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/IfUnlessModifier:
  Enabled: false

Style/RedundantArgument:
  Enabled: false

Layout/LineLength:
  Enabled: false

Lint/DuplicateBranch:
  Enabled: false

Naming/AccessorMethodName:
  Enabled: false

Performance/RedundantMerge:
  Enabled: false

Performance/CollectionLiteralInLoop:
  Enabled: false

Performance/RangeInclude:
  Enabled: false
